name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install typos
        run: cargo install typos-cli --locked

      - name: Check spelling
        run: typos .

  vale:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Vale
        run: |
          VALE_VERSION=3.12.0
          curl -fsSL -o /tmp/vale.tar.gz "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          tar -xzf /tmp/vale.tar.gz -C /tmp
          sudo install /tmp/vale /usr/local/bin/vale

      - name: Check prose
        run: just lint

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install base tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo just curl tar

      - name: Install prek and actionlint
        run: |
          cargo install prek --locked
          GOBIN=$HOME/.local/bin go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run repository checks
        run: just check

      - name: Run TCP smoke test
        run: just smoke-test

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('Project.toml') != '' && hashFiles('test/runtests.jl') != '' }}
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
